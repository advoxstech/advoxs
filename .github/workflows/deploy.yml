name: Deploy

on:
  workflow_run:
    workflows: ["Build images"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/advoxs

            # docker-compose.override.yml é só pra dev local (roda `next dev`
            # etc) e o Compose carrega ele automaticamente sempre que existe
            # no diretório, sem precisar de -f — como agora sincronizamos o
            # repo inteiro aqui embaixo, ele passaria a "vazar" pra produção
            # se não pinássemos explicitamente qual arquivo usar.
            export COMPOSE_FILE=docker-compose.yml

            # Sem isso, o deploy usa o docker-compose.yml (e qualquer outro
            # arquivo) parado na versão que estava em /opt/advoxs desde o
            # último clone/sync manual — mudanças no repo (ex: namespace do
            # ghcr.io) nunca chegavam de fato no VPS.
            git fetch origin main
            git reset --hard origin/main

            # Pacotes do GHCR são privados por padrão — sem login o pull
            # falha com "denied" pras 5 imagens da aplicação (postgres/redis/
            # qdrant vêm do Docker Hub público, não precisam disso).
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker compose pull

            # Derruba tudo (containers + rede do compose) antes de recriar —
            # evita containers presos numa rede antiga/desanexada (visto em
            # produção: postgres/redis sem nenhuma rede Docker anexada depois
            # de um `docker compose run` isolado). Volumes nomeados
            # (postgres_data etc.) não são afetados por `down` sem `-v`.
            docker compose down

            # Sobe só a infra primeiro, com tempo pro Postgres aceitar
            # conexões antes da migration.
            docker compose up -d postgres redis qdrant
            for i in $(seq 1 15); do
              docker compose exec -T postgres pg_isready -U advoxs && break
              echo "Aguardando Postgres ficar pronto... ($i/15)"
              sleep 2
            done

            docker compose run --rm api uv run alembic upgrade head
            docker compose up -d
            docker compose ps
