services:
  web:
    build:
      target: deps
    command: ["pnpm", "--filter=@advoxs/web", "dev"]
    volumes:
      - ./apps/web:/repo/apps/web
      - ./packages:/repo/packages
      - /repo/node_modules
      - /repo/apps/web/node_modules
      - /repo/apps/web/.next

  api:
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./apps/api:/app

  agents:
    ports:
      - "8001:8001"
    volumes:
      - ./apps/agents:/app

  worker:
    volumes:
      - ./apps/worker:/app

  postgres:
    ports:
      - "5432:5432"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    ports:
      - "6379:6379"
