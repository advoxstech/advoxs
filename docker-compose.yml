x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-env-file: &default-env-file
  - .env

networks:
  default:
    name: advoxs

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  rag_uploads:
  kb_uploads:

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: ghcr.io/advoxs/web:${TAG:-latest}
    restart: unless-stopped
    env_file: *default-env-file
    environment:
      # Na rede do compose o api é resolvido pelo nome do serviço
      API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    logging: *default-logging

  api:
    build:
      context: apps/api
    image: ghcr.io/advoxs/api:${TAG:-latest}
    restart: unless-stopped
    env_file: *default-env-file
    environment:
      RAG_API_URL: http://api_rag:8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - kb_uploads:/data/kb_uploads
    depends_on:
      - postgres
      - redis
      - api_rag
    logging: *default-logging

  agents:
    build:
      context: apps/agents
    image: ghcr.io/advoxs/agents:${TAG:-latest}
    restart: unless-stopped
    env_file: *default-env-file
    environment:
      # Checkpoint do LangGraph em database dedicado (init 002-databases.sh)
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: advoxs_agents
      DATABASE_NAME: advoxs_agents
      DATABASE_PASSWORD: ${AGENTS_DB_PASSWORD:-changeme}
      RAG_API_URL: http://api_rag:8000
      # Debounce de rajada (services/concat_messages.py) — código legado do
      # projeto standalone lê host/porta separados, não REDIS_URL (usado por
      # api/worker). Sem isso, POST /messages falha com 503 (Redis indisponível).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - postgres
      - redis
      - api_rag
    logging: *default-logging

  api_rag:
    build:
      context: apps/api_rag
    image: ghcr.io/advoxs/api-rag:${TAG:-latest}
    restart: unless-stopped
    env_file: *default-env-file
    environment:
      # Metadados de documentos em database dedicado (init 002-databases.sh)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: advoxs_rag
      POSTGRES_DB: advoxs_rag
      POSTGRES_PASSWORD: ${RAG_DB_PASSWORD:-changeme}
      API_KEY: ${RAG_API_KEY:-changeme}
      UPLOAD_DIR_USER: /data/uploads/users
      UPLOAD_DIR_SYSTEM: /data/uploads/system
    volumes:
      - rag_uploads:/data/uploads
    extra_hosts:
      # Permite o container alcançar a API de sparse embeddings rodando no host
      # (fora do compose) via URL_API_LOCAL_SPARSE=http://host.docker.internal:PORT/embed.
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - qdrant
    logging: *default-logging

  worker:
    build:
      context: apps/worker
    image: ghcr.io/advoxs/worker:${TAG:-latest}
    restart: unless-stopped
    env_file: *default-env-file
    environment:
      RAG_API_URL: http://api_rag:8000
    volumes:
      - kb_uploads:/data/kb_uploads
    depends_on:
      - postgres
      - redis
      - api_rag
    logging: *default-logging

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-advoxs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-advoxs}
      # Consumidos pelo init 002-databases.sh (databases advoxs_agents/advoxs_rag)
      AGENTS_DB_PASSWORD: ${AGENTS_DB_PASSWORD:-changeme}
      RAG_DB_PASSWORD: ${RAG_DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infra/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    logging: *default-logging

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    logging: *default-logging
